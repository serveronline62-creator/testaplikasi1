<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📦 Order Komponen System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <style>
        :root, [data-theme="dark"] {
            --bg-primary: #0b1120; --bg-secondary: #111827; --bg-card: #1a2332; --bg-card-hover: #1e293b;
            --bg-input: #0f172a; --border: #1e3a5f; --border-focus: #00d4aa; --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.15); --accent-glow: rgba(0, 212, 170, 0.3);
            --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6; --success: #10b981;
            --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #64748b;
            --shadow: 0 4px 24px rgba(0,0,0,0.3); --shadow-glow: 0 0 30px rgba(0,212,170,0.08);
            --navbar-bg: rgba(11,17,32,0.85); --table-head-bg: rgba(0,0,0,0.25);
            --row-hover: rgba(0,212,170,0.03); --new-row-bg: rgba(0,212,170,0.06);
            --overlay-bg: rgba(0,0,0,0.6); --toast-bg: #1a2332; --modal-bg: #1a2332;
            --radius: 8px; --radius-lg: 14px;
        }
        [data-theme="light"] {
            --bg-primary: #f0f4f8; --bg-secondary: #e2e8f0; --bg-card: #ffffff; --bg-card-hover: #f8fafc;
            --bg-input: #f1f5f9; --border: #cbd5e1; --border-focus: #0d9488; --accent: #0d9488;
            --accent-dim: rgba(13,148,136,0.12); --accent-glow: rgba(13,148,136,0.15);
            --warning: #d97706; --danger: #dc2626; --info: #2563eb; --success: #059669;
            --text-primary: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
            --shadow: 0 4px 24px rgba(0,0,0,0.08); --shadow-glow: 0 0 20px rgba(13,148,136,0.06);
            --navbar-bg: rgba(240,244,248,0.9); --table-head-bg: #f1f5f9;
            --row-hover: rgba(13,148,136,0.04); --new-row-bg: rgba(13,148,136,0.06);
            --overlay-bg: rgba(0,0,0,0.3); --toast-bg: #ffffff; --modal-bg: #ffffff;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; transition: background 0.4s, color 0.4s; }
        body::before { content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(ellipse at 20% 20%, rgba(0,212,170,0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.04) 0%, transparent 50%); pointer-events:none; z-index:0; }
        ::-webkit-scrollbar { width:6px; height:6px; } ::-webkit-scrollbar-track { background:var(--bg-primary); } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
        :focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

        /* AUTH */
        .auth-screen { position:fixed; inset:0; z-index:99999; display:flex; align-items:center; justify-content:center; background:var(--bg-primary); }
        .auth-screen.hidden { display:none; }
        .auth-card { position:relative; z-index:1; background:var(--bg-card); border:1px solid var(--border); border-radius:20px; padding:2.5rem; width:100%; max-width:420px; box-shadow:var(--shadow); animation: authIn 0.5s ease-out; }
        @keyframes authIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        .auth-logo { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:1.5rem; }
        .auth-logo-icon { width:48px; height:48px; background:linear-gradient(135deg,var(--accent),#00a88a); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; color:#0b1120; font-weight:800; }
        [data-theme="light"] .auth-logo-icon { color:#fff; }
        .auth-logo-text { font-size:1.3rem; font-weight:900; } .auth-logo-text span { color:var(--accent); }
        .auth-tabs { display:flex; gap:4px; background:var(--bg-input); border-radius:10px; padding:4px; margin-bottom:1.5rem; }
        .auth-tab { flex:1; padding:9px 0; text-align:center; border-radius:8px; font-size:0.82rem; font-weight:700; color:var(--text-muted); cursor:pointer; border:none; background:none; font-family:inherit; transition:all 0.3s; }
        .auth-tab.active { background:var(--accent); color:#0b1120; }
        [data-theme="light"] .auth-tab.active { color:#fff; }
        .auth-form { display:none; flex-direction:column; gap:1rem; } .auth-form.active { display:flex; }
        .fg { display:flex; flex-direction:column; gap:5px; } .fl { font-size:0.75rem; font-weight:600; color:var(--text-secondary); }
        .fi { background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius); padding:11px 14px; font-size:0.88rem; font-family:inherit; color:var(--text-primary); outline:none; width:100%; transition:all 0.3s; }
        .fi:focus { border-color:var(--border-focus); box-shadow:0 0 0 3px var(--accent-dim); }
        .abtn { width:100%; padding:12px; border-radius:var(--radius); border:none; font-family:inherit; font-size:0.9rem; font-weight:700; cursor:pointer; background:linear-gradient(135deg,var(--accent),#00a88a); color:#0b1120; margin-top:0.5rem; transition:all 0.3s; }
        [data-theme="light"] .abtn { color:#fff; } .abtn:hover { box-shadow:0 0 30px rgba(0,212,170,0.4); }

        /* NAVBAR & LAYOUT */
        .app-wrapper { display:none; } .app-wrapper.visible { display:block; }
        .navbar { position:sticky; top:0; z-index:100; background:var(--navbar-bg); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 2rem; }
        .navbar-inner { max-width:1500px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:64px; }
        .logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
        .logo-icon { width:40px; height:40px; background:linear-gradient(135deg,var(--accent),#00a88a); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#0b1120; font-weight:800; }
        [data-theme="light"] .logo-icon { color:#fff; }
        .logo-text { font-size:1.15rem; font-weight:800; } .logo-text span { color:var(--accent); }
        .nav-right { display:flex; align-items:center; gap:12px; }
        .theme-toggle, .user-btn { width:40px; height:40px; border-radius:10px; border:1px solid var(--border); background:var(--bg-card); color:var(--text-secondary); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.3s; font-size:1rem; }
        .theme-toggle:hover, .user-btn:hover { border-color:var(--accent); color:var(--accent); }
        .user-btn { width:auto; padding:0 12px; gap:8px; font-size:0.8rem; font-weight:600; font-family:inherit; }
        .user-avatar { width:28px; height:28px; border-radius:8px; background:linear-gradient(135deg,var(--accent),#00a88a); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:800; color:#0b1120; }
        [data-theme="light"] .user-avatar { color:#fff; }

        .main-container { position:relative; z-index:1; max-width:1500px; margin:0 auto; padding:2rem; }
        .main-tabs { display:flex; gap:4px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:5px; margin-bottom:1.5rem; width:fit-content; }
        .main-tab { display:flex; align-items:center; gap:8px; padding:10px 20px; border-radius:9px; font-size:0.85rem; font-weight:700; color:var(--text-muted); cursor:pointer; border:none; background:none; font-family:inherit; transition:all 0.3s; }
        .main-tab.active { background:var(--accent); color:#0b1120; }
        [data-theme="light"] .main-tab.active { color:#fff; }
        .tab-panel { display:none; } .tab-panel.active { display:block; animation: fadeUp 0.3s ease-out; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        /* FORM & STATS */
        .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; margin-bottom:1.5rem; }
        .stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1rem; display:flex; align-items:center; gap:0.85rem; transition:all 0.3s; }
        .stat-card:hover { border-color:var(--accent); transform:translateY(-2px); }
        .stat-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:0.9rem; }
        .stat-icon.total { background:rgba(0,212,170,0.12); color:var(--accent); }
        .stat-icon.pending { background:rgba(239,68,68,0.12); color:var(--danger); }
        .stat-icon.proses { background:rgba(168,85,247,0.12); color:#a855f7; }
        .stat-icon.ready { background:rgba(245,158,11,0.12); color:var(--warning); }
        .stat-value { font-size:1.4rem; font-weight:800; font-family:'JetBrains Mono',monospace; }
        .stat-label { font-size:0.65rem; color:var(--text-muted); font-weight:600; text-transform:uppercase; }
        .form-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1rem; margin-bottom:1.5rem; }
        .form-group { display:flex; flex-direction:column; gap:5px; }
        .form-label { font-size:0.75rem; font-weight:600; color:var(--text-secondary); }
        .form-input, .form-select { background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; font-size:0.85rem; font-family:inherit; color:var(--text-primary); outline:none; width:100%; transition:all 0.3s; }
        .form-input:focus, .form-select:focus { border-color:var(--border-focus); box-shadow:0 0 0 3px var(--accent-dim); }
        .form-select { cursor:pointer; }

        /* BUTTONS */
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 22px; border-radius:var(--radius); border:1px solid transparent; font-family:inherit; font-size:0.85rem; font-weight:600; cursor:pointer; transition:all 0.3s; white-space:nowrap; }
        .btn:active { transform:scale(0.97); }
        .btn-primary { background:linear-gradient(135deg,var(--accent),#00a88a); color:#0b1120; box-shadow:0 0 20px rgba(0,212,170,0.2); }
        [data-theme="light"] .btn-primary { color:#fff; }
        .btn-primary:hover { box-shadow:0 0 30px rgba(0,212,170,0.4); transform:translateY(-1px); }
        .btn-danger { background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3); color:var(--danger); }
        .btn-danger:hover { background:rgba(239,68,68,0.2); }

        /* TABLE */
        .table-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; position:relative; }
        .table-toolbar { padding:1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
        .table-toolbar h2 { font-size:1rem; font-weight:700; display:flex; align-items:center; gap:8px; } .table-toolbar h2 i { color:var(--accent); }
        .toolbar-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
        .search-box { display:flex; align-items:center; gap:8px; background:var(--bg-input); border:1px solid var(--border); border-radius:var(--radius); padding:0 12px; }
        .search-box:focus-within { border-color:var(--border-focus); }
        .search-box input { background:none; border:none; outline:none; color:var(--text-primary); font-family:inherit; font-size:0.85rem; padding:8px 0; width:180px; }
        .filter-chips { display:flex; gap:6px; flex-wrap:wrap; }
        .chip { padding:5px 14px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-secondary); font-family:inherit; font-size:0.73rem; font-weight:600; cursor:pointer; transition:all 0.3s; }
        .chip.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
        .table-wrapper { overflow-x:auto; max-height:60vh; overflow-y:auto; }
        .data-table { width:100%; border-collapse:collapse; font-size:0.8rem; }
        .data-table thead th { padding:11px 13px; text-align:left; font-size:0.7rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; background:var(--table-head-bg); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5; }
        .data-table tbody tr { border-bottom:1px solid rgba(128,128,128,0.1); transition:background 0.2s; }
        .data-table tbody tr:hover { background:var(--row-hover); }
        .data-table tbody td { padding:10px 13px; color:var(--text-secondary); white-space:nowrap; font-family:'JetBrains Mono',monospace; font-size:0.75rem; }
        .data-table tbody td.name-cell { font-family:'Plus Jakarta Sans',sans-serif; font-weight:500; color:var(--text-primary); }
        .data-table tbody td.editable-cell { cursor:pointer; position:relative; }
        .data-table tbody td.editable-cell:hover { color:var(--accent); }
        .data-table tbody tr.new-row { background:var(--new-row-bg); animation: rowHL 3s ease-out forwards; }
        @keyframes rowHL { 0% { background:var(--accent-dim); box-shadow:inset 3px 0 0 var(--accent); } 100% { background:transparent; box-shadow:none; } }

        /* STATUS & ACTIONS */
        .status-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:0.68rem; font-weight:700; font-family:'Plus Jakarta Sans',sans-serif; }
        .status-badge.pending { background:rgba(239,68,68,0.12); color:#f87171; border:1px solid rgba(239,68,68,0.2); }
        .status-badge.proses { background:rgba(168,85,247,0.12); color:#c084fc; border:1px solid rgba(168,85,247,0.2); }
        .status-badge.ready { background:rgba(245,158,11,0.12); color:#fbbf24; border:1px solid rgba(245,158,11,0.2); }
        .status-badge.finish { background:rgba(59,130,246,0.12); color:#60a5fa; border:1px solid rgba(59,130,246,0.2); }
        .action-btns { display:flex; gap:5px; }
        .action-btn { width:28px; height:28px; border-radius:7px; border:1px solid var(--border); background:transparent; color:var(--text-muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.3s; font-size:0.7rem; }
        .action-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
        .action-btn.delete:hover { border-color:var(--danger); color:var(--danger); background:rgba(239,68,68,0.1); }

        /* MODAL & TOAST */
        .modal-overlay { display:none; position:fixed; inset:0; background:var(--overlay-bg); backdrop-filter:blur(6px); z-index:1000; align-items:center; justify-content:center; padding:2rem; }
        .modal-overlay.active { display:flex; }
        .modal { background:var(--modal-bg); border:1px solid var(--border); border-radius:var(--radius-lg); width:100%; max-width:450px; box-shadow:var(--shadow); animation: modalSlide 0.3s ease-out; }
        @keyframes modalSlide { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .modal-header { padding:1.15rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
        .modal-header h3 { font-size:1rem; font-weight:700; display:flex; align-items:center; gap:8px; } .modal-header h3 i { color:var(--accent); }
        .modal-close { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.1rem; } .modal-close:hover { color:var(--text-primary); }
        .modal-body { padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
        .modal-footer { padding:1rem 1.5rem; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
        
        .toast-container { position:fixed; top:80px; right:2rem; z-index:99999; display:flex; flex-direction:column; gap:10px; }
        .toast { display:flex; align-items:center; gap:12px; padding:14px 20px; border-radius:var(--radius); background:var(--toast-bg); border:1px solid var(--border); box-shadow:var(--shadow); font-size:0.85rem; animation: toastIn 0.4s ease-out; min-width:300px; }
        .toast.success { border-left:3px solid var(--success); } .toast.success i { color:var(--success); }
        .toast.error { border-left:3px solid var(--danger); } .toast.error i { color:var(--danger); }
        .toast.info { border-left:3px solid var(--info); } .toast.info i { color:var(--info); }
        .toast.removing { animation: toastOut 0.3s ease-in forwards; }
        @keyframes toastIn { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }
        @keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(60px); } }

        .empty-state { padding:3rem 2rem; text-align:center; color:var(--text-muted); }
        .loading-spinner { display:flex; justify-content:center; padding:2rem; }
        .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- AUTH SCREEN -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fas fa-boxes-stacked"></i></div>
                <div class="auth-logo-text">Order<span>System</span></div>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
            </div>
            
            <!-- Login Form -->
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                <div class="fg">
                    <label class="fl">Email</label>
                    <input type="email" class="fi" id="loginEmail" placeholder="admin@company.com" required>
                </div>
                <div class="fg">
                    <label class="fl">Password</label>
                    <input type="password" class="fi" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="abtn"><i class="fas fa-right-to-bracket"></i> Masuk</button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="fg">
                    <label class="fl">Nama Lengkap</label>
                    <input type="text" class="fi" id="regName" placeholder="Nama Anda" required>
                </div>
                <div class="fg">
                    <label class="fl">Email</label>
                    <input type="email" class="fi" id="regEmail" placeholder="email@domain.com" required>
                </div>
                <div class="fg">
                    <label class="fl">Password (Min. 6 karakter)</label>
                    <input type="password" class="fi" id="regPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="abtn"><i class="fas fa-user-plus"></i> Daftar</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div class="app-wrapper" id="appWrapper">
        <!-- NAVBAR -->
        <nav class="navbar">
            <div class="navbar-inner">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-boxes-stacked"></i></div>
                    <div class="logo-text">Order<span>System</span></div>
                </div>
                <div class="nav-right">
                    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
                        <i class="fas fa-sun"></i><i class="fas fa-moon"></i>
                    </button>
                    <button class="user-btn" onclick="handleLogout()">
                        <div class="user-avatar" id="userAvatar">A</div>
                        <span id="userName">Admin</span>
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <div class="main-container">
            <!-- TABS -->
            <div class="main-tabs">
                <button class="main-tab active" onclick="switchTab('orders', this)">
                    <i class="fas fa-clipboard-list"></i> Data Order
                </button>
            </div>

            <!-- ORDERS TAB PANEL -->
            <div class="tab-panel active" id="panel-orders">
                <!-- STATS -->
                <div class="stats-row" id="statsRow">
                    <div class="stat-card">
                        <div class="stat-icon total"><i class="fas fa-layer-group"></i></div>
                        <div><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total Order</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon pending"><i class="fas fa-clock"></i></div>
                        <div><div class="stat-value" id="statPending">0</div><div class="stat-label">Pending</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon proses"><i class="fas fa-gears"></i></div>
                        <div><div class="stat-value" id="statProses">0</div><div class="stat-label">Proses</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon ready"><i class="fas fa-truck-ramp-box"></i></div>
                        <div><div class="stat-value" id="statReady">0</div><div class="stat-label">Ready</div></div>
                    </div>
                </div>

                <!-- INPUT FORM -->
                <div class="table-card" style="margin-bottom: 1.5rem; padding: 1.5rem;">
                    <h3 style="font-size: 0.9rem; margin-bottom: 1rem; color: var(--accent);"><i class="fas fa-plus-circle"></i> Tambah Order Baru</h3>
                    <form id="orderForm" onsubmit="handleAddOrder(event)">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Nama Komponen</label>
                                <input type="text" class="form-input" id="fNama" required placeholder="Contoh: Resistor 10k">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Part Number</label>
                                <input type="text" class="form-input" id="fPart" required placeholder="Contoh: CFR-25JB-52-10K">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Jumlah</label>
                                <input type="number" class="form-input" id="fJumlah" required placeholder="0">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Supplier</label>
                                <input type="text" class="form-input" id="fSupplier" placeholder="Nama Supplier">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Ditugaskan ke Teknisi</label>
                                <select class="form-select" id="fTeknisi">
                                    <option value="">-- Pilih Teknisi --</option>
                                    <option value="Teknisi A">Teknisi A</option>
                                    <option value="Teknisi B">Teknisi B</option>
                                    <option value="Teknisi C">Teknisi C</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Simpan Order</button>
                    </form>
                </div>

                <!-- TABLE -->
                <div class="table-card">
                    <div class="table-toolbar">
                        <h2><i class="fas fa-table-list"></i> Daftar Order Komponen</h2>
                        <div class="toolbar-right">
                            <div class="filter-chips">
                                <button class="chip active" onclick="filterTable('all', this)">Semua</button>
                                <button class="chip" onclick="filterTable('pending', this)">Pending</button>
                                <button class="chip" onclick="filterTable('proses', this)">Proses</button>
                                <button class="chip" onclick="filterTable('ready', this)">Ready</button>
                                <button class="chip" onclick="filterTable('finish', this)">Finish</button>
                            </div>
                            <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" placeholder="Cari komponen..." onkeyup="searchTable(this.value)">
                            </div>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Tanggal</th>
                                    <th>Nama Komponen</th>
                                    <th>Part Number</th>
                                    <th>Jumlah</th>
                                    <th>Supplier</th>
                                    <th>Teknisi</th>
                                    <th>Status <span style="font-weight:400; font-size:0.6rem; text-transform:none;">(klik untuk ubah)</span></th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr><td colspan="8" class="empty-state"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- EDIT STATUS MODAL -->
    <div class="modal-overlay" id="statusModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-arrows-rotate"></i> Update Status Order</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <p style="font-size:0.85rem; color:var(--text-secondary);">Komponen: <strong id="modalKomponen" style="color:var(--text-primary)"></strong></p>
                <div class="form-group">
                    <label class="form-label">Pilih Status Baru</label>
                    <select class="form-select" id="modalStatusSelect">
                        <option value="pending">🔴 Pending</option>
                        <option value="proses">🟣 Proses</option>
                        <option value="ready">🟡 Ready</option>
                        <option value="finish">🔵 Finish</option>
                    </select>
                </div>
                <p style="font-size:0.7rem; color:var(--warning);"><i class="fas fa-bell"></i> Notifikasi WA otomatis akan dikirim ke Teknisi terkait.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()" style="background:transparent; border:1px solid var(--border); color:var(--text-secondary);">Batal</button>
                <button class="btn btn-primary" id="btnSaveStatus" onclick="saveStatusChange()"><i class="fas fa-check"></i> Simpan & Kirim WA</button>
            </div>
        </div>
    </div>

<script>
// ==========================================
// 1. KONFIGURASI FIREBASE (GANTI DENGAN MILIKMU)
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyXXXXXXXXXXXXXXX",
    authDomain: "your-app.firebaseapp.com",
    projectId: "your-app-id",
    storageBucket: "your-app-id.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// ==========================================
// 2. KONFIGURASI FONTE & DATABASE TEKNISI
// ==========================================
// GANTI DENGAN API KEY FONTE KAMU
const FONTE_API_KEY = 'GANTI_DENGAN_API_KEY_FONTE_MU'; 

// Mapping Nama Teknisi di form/select dengan Nomor WhatsApp-nya
// FORMAT WA: 62 (tanpa +) + nomor HP (tanpa 0 di depan)
const DATABASE_TEKNISI = {
    'Teknisi A': '6281234567890', // <-- Ganti nomor ini
    'Teknisi B': '6281298765432', // <-- Ganti nomor ini
    'Teknisi C': '6281350011223', // <-- Ganti nomor ini
};

// Fungsi Kirim WhatsApp via Fonnte
async function kirimNotifikasiWA(targets, message) {
    if (!targets || targets.length === 0 || FONTE_API_KEY.includes('GANTI')) {
        console.warn('API Key Fonnte belum diisi atau tidak ada target.');
        return;
    }
    try {
        const response = await fetch('https://api.fonnte.com/send', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': FONTE_API_KEY
            },
            body: JSON.stringify({ target: targets, message: message })
        });
        const result = await response.json();
        if (result.status === true) {
            showToast('✅ Notifikasi WA terkirim ke Teknisi!', 'success');
        } else {
            console.error('Gagal kirim WA:', result);
            showToast('❌ Gagal kirim WA: ' + (result.reason || 'Error'), 'error');
        }
    } catch (error) {
        console.error('Error Fonnte:', error);
        showToast('❌ Error jaringan ke Fonnte', 'error');
    }
}

// Fungsi Template Pesan
function buatPesanStatus(data, statusLama, statusBaru) {
    const emoji = { 'pending': '🔴', 'proses': '🟣', 'ready': '🟡', 'finish': '🔵' };
    const waktu = new Date().toLocaleString('id-ID', { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
    
    return `*[ UPDATE STATUS ORDER ]* ${emoji[statusBaru] || '📦'}

Detail Komponen:
• Nama  : ${data.namaKomponen || '-'}
• Part# : ${data.partNumber || '-'}
• Jumlah: ${data.jumlah || '-'}
• Teknisi: ${data.teknisi || 'Belum ditugaskan'}

Perubahan Status:
 ${emoji[statusLama] || '⚪'} *${statusLama.toUpperCase()}*  
⬇️
 ${emoji[statusBaru] || '⚪'} *${statusBaru.toUpperCase()}*

Waktu update: ${waktu}
_Dikirim otomatis oleh Sistem Order_`;
}

// ==========================================
// 3. VARIABEL GLOBAL & STATE
// ==========================================
let allOrders = [];
let currentFilter = 'all';
let currentSearch = '';
let editingOrderId = null;

// ==========================================
// 4. AUTH LOGIC
// ==========================================
function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
    } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
    }
}

function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPassword').value;
    auth.signInWithEmailAndPassword(email, pass)
        .then(() => showToast('Login berhasil!', 'success'))
        .catch(err => showToast('Error: ' + err.message, 'error'));
}

function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const pass = document.getElementById('regPassword').value;
    auth.createUserWithEmailAndPassword(email, pass)
        .then((cred) => {
            return db.collection('users').doc(cred.user.uid).set({ name, email, role: 'user' });
        })
        .then(() => showToast('Registrasi berhasil, silakan login.', 'success'))
        .catch(err => showToast('Error: ' + err.message, 'error'));
}

function handleLogout() {
    auth.signOut();
}

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appWrapper').classList.add('visible');
        const nama = user.email.split('@')[0];
        document.getElementById('userName').innerText = nama;
        document.getElementById('userAvatar').innerText = nama.charAt(0).toUpperCase();
        loadOrders();
    } else {
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('appWrapper').classList.remove('visible');
    }
});

// ==========================================
// 5. THEME LOGIC
// ==========================================
function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    localStorage.setItem('theme', html.getAttribute('data-theme'));
}
if (localStorage.getItem('theme')) {
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme'));
}

// ==========================================
// 6. TOAST NOTIFICATION
// ==========================================
function showToast(msg, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
    toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> <span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => { toast.classList.add('removing'); setTimeout(() => toast.remove(), 300); }, 3000);
}

// ==========================================
// 7. ORDERS LOGIC (CRUD)
// ==========================================
async function loadOrders() {
    db.collection('orders').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
        allOrders = [];
        snapshot.forEach(doc => {
            allOrders.push({ id: doc.id, ...doc.data() });
        });
        updateStats();
        renderTable();
    });
}

function updateStats() {
    document.getElementById('statTotal').innerText = allOrders.length;
    document.getElementById('statPending').innerText = allOrders.filter(o => o.status === 'pending').length;
    document.getElementById('statProses').innerText = allOrders.filter(o => o.status === 'proses').length;
    document.getElementById('statReady').innerText = allOrders.filter(o => o.status === 'ready').length;
}

function renderTable() {
    const tbody = document.getElementById('tableBody');
    let filtered = allOrders;

    if (currentFilter !== 'all') {
        filtered = filtered.filter(o => o.status === currentFilter);
    }
    if (currentSearch) {
        const s = currentSearch.toLowerCase();
        filtered = filtered.filter(o => 
            (o.namaKomponen || '').toLowerCase().includes(s) || 
            (o.partNumber || '').toLowerCase().includes(s) ||
            (o.teknisi || '').toLowerCase().includes(s)
        );
    }

    if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty-state"><i class="fas fa-inbox" style="font-size:2rem; display:block; margin-bottom:10px; opacity:0.3;"></i>Belum ada data order.</td></tr>`;
        return;
    }

    tbody.innerHTML = filtered.map(order => {
        const tgl = order.createdAt ? new Date(order.createdAt.seconds * 1000).toLocaleDateString('id-ID') : '-';
        const isNew = (Date.now() - (order.createdAt?.seconds * 1000 || 0)) < 5000;
        return `
        <tr class="${isNew ? 'new-row' : ''}">
            <td>${tgl}</td>
            <td class="name-cell">${order.namaKomponen || '-'}</td>
            <td>${order.partNumber || '-'}</td>
            <td>${order.jumlah || '-'}</td>
            <td>${order.supplier || '-'}</td>
            <td>${order.teknisi || '<span style="color:var(--text-muted)">-</span>'}</td>
            <td class="editable-cell" onclick="openStatusModal('${order.id}', '${order.namaKomponen}', '${order.status}', '${order.teknisi}')">
                <span class="status-badge ${order.status}">${order.status || 'pending'}</span>
            </td>
            <td>
                <div class="action-btns">
                    <button class="action-btn delete" title="Hapus" onclick="deleteOrder('${order.id}')"><i class="fas fa-trash"></i></button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

async function handleAddOrder(e) {
    e.preventDefault();
    const data = {
        namaKomponen: document.getElementById('fNama').value,
        partNumber: document.getElementById('fPart').value,
        jumlah: document.getElementById('fJumlah').value,
        supplier: document.getElementById('fSupplier').value,
        teknisi: document.getElementById('fTeknisi').value,
        status: 'pending',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    try {
        await db.collection('orders').add(data);
        e.target.reset();
        showToast('Order baru berhasil ditambahkan!', 'success');
        
        // Opsional: Kirim WA saat order baru masuk
        if(data.teknisi && DATABASE_TEKNISI[data.teknisi]) {
            const pesanBaru = `📦 *ORDER BARU MASUK!*\n\nKomponen: ${data.namaKomponen}\nPart#: ${data.partNumber}\nJumlah: ${data.jumlah}\nDitugaskan ke: *${data.teknisi}*\n\n_Segera cek sistem order._`;
            kirimNotifikasiWA([DATABASE_TEKNISI[data.teknisi]], pesanBaru);
        }
    } catch (err) {
        showToast('Error: ' + err.message, 'error');
    }
}

async function deleteOrder(id) {
    if (!confirm('Yakin ingin menghapus order ini?')) return;
    try {
        await db.collection('orders').doc(id).delete();
        showToast('Order berhasil dihapus.', 'info');
    } catch (err) {
        showToast('Error: ' + err.message, 'error');
    }
}

// ==========================================
// 8. FILTER & SEARCH
// ==========================================
function filterTable(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
}

function searchTable(val) {
    currentSearch = val;
    renderTable();
}

function switchTab(tabId, btn) {
    document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + tabId).classList.add('active');
}

// ==========================================
// 9. MODAL UPDATE STATUS & KIRIM NOTIFIKASI
// ==========================================
function openStatusModal(id, nama, statusSekarang, teknisi) {
    editingOrderId = id;
    document.getElementById('modalKomponen').innerText = nama;
    document.getElementById('modalStatusSelect').value = statusSekarang || 'pending';
    document.getElementById('statusModal').classList.add('active');
    
    // Simpan status lama ke atribut data di modal untuk dipakai nanti
    document.getElementById('statusModal').dataset.oldStatus = statusSekarang;
    document.getElementById('statusModal').dataset.teknisi = teknisi;
}

function closeModal() {
    document.getElementById('statusModal').classList.remove('active');
    editingOrderId = null;
}

async function saveStatusChange() {
    if (!editingOrderId) return;

    const modal = document.getElementById('statusModal');
    const statusBaru = document.getElementById('modalStatusSelect').value;
    const statusLama = modal.dataset.oldStatus;
    const namaTeknisi = modal.dataset.teknisi;

    // Jika status tidak berubah, batalkan
    if (statusLama === statusBaru) {
        showToast('Status tidak berubah.', 'info');
        closeModal();
        return;
    }

    // Disable tombol sementara proses berjalan
    const btn = document.getElementById('btnSaveStatus');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;"></div> Memproses...';

    try {
        // 1. Ambil data lengkap dokumen dari Firestore
        const docSnap = await db.collection('orders').doc(editingOrderId).get();
        const dataLengkap = docSnap.data();

        // 2. Update status di Firestore
        await db.collection('orders').doc(editingOrderId).update({ status: statusBaru });

        // 3. LOGIKA KIRIM NOTIFIKASI WA KE TEKNISI
        let targetNomor = [];
        
        if (namaTeknisi && DATABASE_TEKNISI[namaTeknisi]) {
            // Jika ada teknisi yang ditugaskan, kirim ke nomor teknisi tersebut
            targetNomor.push(DATABASE_TEKNISI[namaTeknisi]);
        } else {
            // Fallback: Jika teknisi tidak diassign, kirim ke semua teknisi
            targetNomor = Object.values(DATABASE_TEKNISI);
        }

        // 4. Buat pesan dan kirim
        const pesan = buatPesanStatus(dataLengkap, statusLama, statusBaru);
        await kirimNotifikasiWA(targetNomor, pesan);

        closeModal();
        showToast('Status berhasil diupdate!', 'success');

    } catch (error) {
        console.error('Error updating status:', error);
        showToast('Gagal update: ' + error.message, 'error');
    } finally {
        // Kembalikan tombol ke semula
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check"></i> Simpan & Kirim WA';
    }
}

// Close modal jika klik di luar box
document.getElementById('statusModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

</script>
</body>
</html>
